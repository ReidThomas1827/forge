<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Forge"/>
<title>Forge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#000;font-family:'Barlow Condensed',Impact,sans-serif;color:#F0F0F0;display:flex;justify-content:center;}
#app{width:100%;max-width:430px;min-height:100vh;background:#0E0E10;display:flex;flex-direction:column;}
.screen{flex:1;overflow-y:auto;padding:0 16px 110px;}
.hidden{display:none!important;}
.logo{font-size:48px;font-weight:900;letter-spacing:6px;color:#FF6B2C;line-height:1;}
.logo-sub{font-size:14px;color:#888;letter-spacing:3px;text-transform:uppercase;margin-top:4px;}
.home-header{padding-top:60px;padding-bottom:32px;}
.section-label{font-size:13px;font-weight:700;color:#888;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
.empty-msg{color:#888;font-size:15px;text-align:center;margin-top:40px;line-height:2;}
.big-btn{width:100%;background:#FF6B2C;color:#fff;border:none;border-radius:16px;padding:20px 24px;font-size:22px;font-weight:800;font-family:inherit;letter-spacing:1px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:32px;}
.big-btn-plus{font-size:32px;line-height:1;}
.ghost-btn{background:transparent;border:1px solid #222228;color:#888;border-radius:10px;padding:12px 20px;font-family:inherit;font-size:14px;cursor:pointer;width:100%;margin-top:4px;}
.back-btn{background:#222228;border:none;color:#F0F0F0;border-radius:10px;padding:8px 14px;font-size:18px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.done-btn{background:#FF6B2C;border:none;color:#fff;border-radius:10px;padding:8px 18px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px;flex-shrink:0;}
.edit-btn{background:#222228;border:none;color:#F0F0F0;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0;}
.delete-btn{background:transparent;border:none;font-size:20px;cursor:pointer;padding:8px;flex-shrink:0;}
.log-header{display:flex;align-items:center;justify-content:space-between;padding-top:56px;padding-bottom:16px;gap:8px;}
.log-title{font-size:17px;font-weight:800;letter-spacing:0.5px;flex:1;text-align:center;}
.log-date{font-size:13px;color:#888;margin-bottom:16px;letter-spacing:1px;}
.summary-card{background:#1A1A1E;border-radius:14px;padding:16px 18px;margin-bottom:12px;cursor:pointer;border-left:4px solid #FF6B2C;}
.summary-date{font-size:16px;font-weight:700;margin-bottom:4px;}
.summary-exlist{font-size:13px;color:#888;margin-bottom:6px;line-height:1.4;}
.summary-vol{font-size:14px;color:#FF6B2C;font-weight:700;}
/* Exercise cards */
.ex-card{background:#1A1A1E;border-radius:14px;padding:14px 14px 10px;margin-bottom:12px;border-left:3px solid #FF6B2C;}
.ex-card.superset{border-left:3px solid #FF6B2C44;}
.ex-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.ex-name{font-size:16px;font-weight:800;color:#FF6B2C;letter-spacing:0.5px;flex:1;}
.ex-note-small{font-size:11px;color:#888;margin-bottom:6px;font-style:italic;}
.remove-ex-btn{background:transparent;border:none;color:#888;font-size:15px;cursor:pointer;padding:4px 6px;}
.superset-tag{font-size:9px;font-weight:900;color:#FF6B2C;letter-spacing:2px;margin-bottom:5px;}
.ex-info-btn{background:transparent;border:none;color:#FF6B2C;font-size:15px;cursor:pointer;padding:4px 6px;line-height:1;}
/* Last session ref */
.last-ref{background:#1e1e24;border-radius:8px;padding:6px 10px;margin-bottom:8px;font-size:11px;border-left:2px solid #FF6B2C44;}
.last-ref-title{color:#FF6B2C88;font-weight:700;letter-spacing:1px;margin-bottom:3px;font-size:10px;}
.last-ref-row{display:flex;gap:10px;flex-wrap:wrap;}
.last-ref-set{color:#666;}
/* Sets */
.set-grid{display:grid;grid-template-columns:24px 1fr 1fr 38px;gap:5px;align-items:center;margin-bottom:5px;}
.set-col-label{font-size:10px;color:#888;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.set-num{font-size:13px;color:#888;font-weight:700;text-align:center;}
.set-input{background:#222228;border:none;border-radius:8px;color:#F0F0F0;font-size:16px;font-weight:700;font-family:inherit;padding:9px 4px;text-align:center;width:100%;outline:none;}
.set-input.logged{background:#1a2e1a;color:#4ade80;}
.done-set-btn{background:#222228;border:none;color:#888;border-radius:8px;font-size:16px;cursor:pointer;height:36px;width:36px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.done-set-btn.logged{background:#16a34a22;color:#4ade80;}
.add-set-btn{background:transparent;border:1px dashed #2a2a2a;color:#666;border-radius:8px;padding:6px;width:100%;font-size:12px;cursor:pointer;font-family:inherit;margin-top:4px;}
.add-ex-btn{background:transparent;border:2px dashed #FF6B2C33;color:#FF6B2C;border-radius:14px;padding:14px;width:100%;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;letter-spacing:1px;margin-top:8px;}
/* In-workout history */
.inwork-hist{background:#111118;border-radius:8px;padding:8px 10px;margin-bottom:8px;font-size:11px;}
.inwork-hist-title{color:#888;font-weight:700;letter-spacing:1px;font-size:10px;margin-bottom:4px;}
.inwork-hist-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1e1e24;}
.inwork-hist-row:last-child{border-bottom:none;}
.inwork-hist-date{color:#666;}
.inwork-hist-val{color:#aaa;font-weight:700;}
/* Timer bar - moved to bottom above nav */
.timer-bar{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom, 16px));left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#1a1a1e;border-top:2px solid #FF6B2C;z-index:150;padding:10px 16px 8px;}
.timer-top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.timer-count{font-size:32px;font-weight:900;color:#FF6B2C;letter-spacing:2px;line-height:1;}
.timer-label{font-size:11px;color:#888;font-weight:700;letter-spacing:2px;text-transform:uppercase;}
.timer-controls{display:flex;align-items:center;gap:8px;}
.timer-adj{background:#222228;border:none;color:#F0F0F0;border-radius:8px;padding:6px 12px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer;}
.timer-skip{background:#FF6B2C;border:none;color:#fff;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}
.timer-progress-track{background:#222228;border-radius:4px;height:4px;overflow:hidden;}
.timer-progress-fill{height:100%;background:#FF6B2C;border-radius:4px;transition:width 0.9s linear;}
/* Program */
.prog-note{font-size:13px;color:#888;margin-bottom:20px;line-height:1.6;}
.day-card{background:#1A1A1E;border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;}
.day-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.day-pill{border-radius:8px;padding:4px 10px;font-size:13px;font-weight:900;color:#fff;letter-spacing:1px;}
.day-name{font-size:18px;font-weight:800;flex:1;}
.day-arrow{font-size:24px;color:#888;}
.day-ex-preview{display:flex;flex-wrap:wrap;gap:6px;}
.day-ex-chip{background:#222228;border-radius:6px;padding:3px 8px;font-size:11px;color:#888;}
.day-ex-more{font-size:11px;color:#888;align-self:center;}
.prog-ex-card{background:#1A1A1E;border-radius:12px;padding:12px 14px;margin-bottom:8px;}
.prog-ex-row{display:flex;justify-content:space-between;align-items:flex-start;}
.prog-ex-name{font-size:16px;font-weight:800;margin-bottom:2px;}
.prog-ex-sets{font-size:13px;color:#888;}
.prog-ex-note{font-size:11px;color:#888;margin-top:6px;font-style:italic;}
.sets-badge{border-radius:8px;padding:4px 10px;font-size:12px;font-weight:800;white-space:nowrap;}
.superset-label{font-size:10px;font-weight:900;color:#888;letter-spacing:2px;margin-bottom:4px;margin-top:8px;padding-left:16px;}
.progression-box{background:#1A1A1E;border-radius:14px;padding:16px;margin-top:8px;}
.progression-title{font-size:13px;font-weight:900;letter-spacing:2px;color:#888;margin-bottom:12px;}
.progression-row{display:flex;justify-content:space-between;padding-bottom:8px;}
.progression-label{font-size:14px;color:#888;}
.progression-val{font-size:14px;font-weight:800;}
.progression-divider{border-top:1px solid #222228;margin-top:8px;padding-top:10px;}
/* Detail */
.vol-big{font-size:52px;font-weight:900;color:#FF6B2C;line-height:1;margin-top:8px;}
.vol-unit{font-size:22px;font-weight:400;color:#888;}
.vol-label{font-size:13px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;margin-top:4px;}
.detail-set-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #222228;}
.detail-set-num{color:#888;font-size:14px;}
.detail-set-val{font-size:15px;font-weight:700;}
/* Progress */
.progress-ex-card{background:#1A1A1E;border-radius:12px;padding:14px;margin-bottom:12px;cursor:pointer;}
.progress-ex-name{font-size:18px;font-weight:800;color:#FF6B2C;margin-bottom:4px;}
.progress-ex-best{font-size:13px;color:#888;}
.progress-history-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #222228;}
.progress-history-date{font-size:13px;color:#888;}
.progress-history-sets{font-size:14px;font-weight:700;}
/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#121214;border-top:1px solid #222228;display:flex;padding-bottom:env(safe-area-inset-bottom,16px);}
.nav-btn{flex:1;background:transparent;border:none;color:#F0F0F0;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 4px;cursor:pointer;font-family:inherit;}
.nav-icon{font-size:20px;}
.nav-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#888;}
.nav-label.active{color:#FF6B2C;}
/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;z-index:200;}
.modal{background:#1C1C1F;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:85vh;display:flex;flex-direction:column;}
.modal-title{font-size:20px;font-weight:800;margin-bottom:16px;letter-spacing:1px;}
.search-input{background:#222228;border:none;border-radius:10px;color:#F0F0F0;font-size:16px;font-family:inherit;padding:12px 16px;width:100%;outline:none;margin-bottom:8px;}
.muscle-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:4px;scrollbar-width:none;}
.muscle-tabs::-webkit-scrollbar{display:none;}
.muscle-tab{background:#222228;border:none;color:#888;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.muscle-tab.active{background:#FF6B2C;color:#fff;}
.ex-list{overflow-y:auto;flex:1;}
.ex-item{display:flex;align-items:center;width:100%;background:transparent;border:none;border-bottom:1px solid #222228;color:#F0F0F0;font-family:inherit;font-size:15px;font-weight:600;padding:11px 4px;cursor:pointer;}
.ex-muscle-tag{font-size:10px;color:#888;background:#222228;border-radius:4px;padding:2px 6px;font-weight:700;margin-left:8px;flex-shrink:0;}
.info-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;z-index:300;}
.info-modal{background:#1C1C1F;border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-height:90vh;overflow-y:auto;}
.info-modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.info-modal-name{font-size:24px;font-weight:900;color:#FF6B2C;letter-spacing:1px;flex:1;}
.info-close-btn{background:#222228;border:none;color:#F0F0F0;border-radius:10px;padding:8px 12px;font-size:16px;cursor:pointer;font-family:inherit;}
.info-muscle-badge{display:inline-block;background:#FF6B2C22;color:#FF6B2C;border-radius:8px;padding:4px 12px;font-size:12px;font-weight:800;letter-spacing:1px;margin-bottom:16px;}
.info-section-title{font-size:13px;font-weight:900;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;margin-top:16px;}
.info-tips{list-style:none;display:flex;flex-direction:column;gap:8px;}
.info-tips li{font-size:15px;color:#F0F0F0;padding-left:16px;position:relative;line-height:1.5;}
.info-tips li::before{content:"→";position:absolute;left:0;color:#FF6B2C;}
.yt-btn{display:flex;align-items:center;gap:10px;background:#FF000022;border:1px solid #FF000044;color:#ff4444;border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer;width:100%;margin-top:16px;}
.add-from-info-btn{display:flex;align-items:center;justify-content:center;background:#FF6B2C;border:none;color:#fff;border-radius:12px;padding:14px 16px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;width:100%;margin-top:10px;}
.edit-set-input{background:#2a2a30;border:1px solid #FF6B2C44;border-radius:8px;color:#F0F0F0;font-size:16px;font-weight:700;font-family:inherit;padding:10px 8px;text-align:center;width:100%;outline:none;}
/* Program edit */
.prog-edit-card{background:#1A1A1E;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.prog-sets-input{background:#222228;border:none;border-radius:6px;color:#F0F0F0;font-size:14px;font-weight:700;font-family:inherit;padding:6px 8px;text-align:center;width:48px;outline:none;}
.prog-reps-input{background:#222228;border:none;border-radius:6px;color:#F0F0F0;font-size:14px;font-weight:700;font-family:inherit;padding:6px 8px;text-align:center;width:60px;outline:none;}
.reset-btn{background:transparent;border:1px solid #444;color:#888;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:13px;cursor:pointer;width:100%;margin-top:12px;}
.prog-remove-btn{background:transparent;border:none;color:#ff4444;font-size:18px;cursor:pointer;padding:4px 8px;flex-shrink:0;}
/* Bible modal */
.bible-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:400;padding:24px;}
.bible-modal{background:#1C1C1F;border-radius:20px;padding:28px 24px 24px;width:100%;max-width:390px;text-align:center;border-top:4px solid #FF6B2C;}
.bible-cross{font-size:32px;margin-bottom:14px;}
.bible-verse{font-size:17px;font-weight:600;line-height:1.65;color:#F0F0F0;margin-bottom:14px;font-style:italic;}
.bible-ref{font-size:13px;font-weight:900;color:#FF6B2C;letter-spacing:2px;text-transform:uppercase;margin-bottom:22px;}
.bible-close{background:#FF6B2C;border:none;color:#fff;border-radius:12px;padding:14px 24px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer;width:100%;letter-spacing:1px;}
/* Save draft banner */
.draft-banner{background:#1a2a1a;border:1px solid #22c55e44;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;font-size:13px;}
.draft-banner-text{color:#4ade80;font-weight:700;}
.draft-resume-btn{background:#22c55e;border:none;color:#fff;border-radius:8px;padding:6px 14px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;}
@keyframes flash{0%,100%{background:#0E0E10}50%{background:#1a3a1a}}
.timer-done{animation:flash 0.4s ease 3;}
</style>
</head>
<body>
<div id="app">

  <!-- Timer bar above nav -->
  <div id="timer-bar" class="timer-bar hidden">
    <div class="timer-top-row">
      <div>
        <div class="timer-label">REST</div>
        <div class="timer-count" id="timer-count">1:30</div>
      </div>
      <div class="timer-controls">
        <button class="timer-adj" onclick="adjustTimer(-15)">−15s</button>
        <button class="timer-adj" onclick="adjustTimer(15)">+15s</button>
        <button class="timer-skip" onclick="skipTimer()">Done</button>
      </div>
    </div>
    <div class="timer-progress-track">
      <div class="timer-progress-fill" id="timer-progress" style="width:100%"></div>
    </div>
  </div>

  <div id="screen-home" class="screen hidden"></div>
  <div id="screen-program" class="screen hidden"></div>
  <div id="screen-program-day" class="screen hidden"></div>
  <div id="screen-log" class="screen hidden"></div>
  <div id="screen-history" class="screen hidden"></div>
  <div id="screen-detail" class="screen hidden"></div>
  <div id="screen-progress" class="screen hidden"></div>
  <div id="screen-progress-ex" class="screen hidden"></div>

  <div id="modal-ex" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-title">Add Exercise</div>
      <input class="search-input" id="ex-search" placeholder="Search exercises..."/>
      <div class="muscle-tabs" id="muscle-tabs"></div>
      <div class="ex-list" id="ex-list"></div>
    </div>
  </div>

  <div id="modal-info" class="info-modal-overlay hidden">
    <div class="info-modal" id="info-modal-content"></div>
  </div>

  <div id="modal-bible" class="bible-overlay hidden">
    <div class="bible-modal">
      <div class="bible-cross">✝️</div>
      <div class="bible-verse" id="bible-verse"></div>
      <div class="bible-ref" id="bible-ref"></div>
      <button class="bible-close" onclick="closeBible()">Rest Up · Start Next Set</button>
    </div>
  </div>

  <div class="nav" id="nav">
    <button class="nav-btn" onclick="goTo('home')"><span class="nav-icon">🏠</span><span class="nav-label" id="nl-home">Home</span></button>
    <button class="nav-btn" onclick="goTo('program')"><span class="nav-icon">📋</span><span class="nav-label" id="nl-program">Program</span></button>
    <button class="nav-btn" onclick="goTo('progress')"><span class="nav-icon">📈</span><span class="nav-label" id="nl-progress">Progress</span></button>
    <button class="nav-btn" onclick="goTo('history')"><span class="nav-icon">🕐</span><span class="nav-label" id="nl-history">History</span></button>
  </div>
</div>

<script>
// ── EXERCISE DATABASE ─────────────────────────────────────────────────────────
const DB=[
  {name:"Bench Press",muscle:"Chest",tips:["Keep shoulder blades pinched and retracted","Bar touches lower chest, not neck","Drive feet into floor for full body tension","Grip slightly wider than shoulder width"],yt:"https://www.youtube.com/results?search_query=bench+press+form+tutorial"},
  {name:"Incline Bench Press",muscle:"Chest",tips:["Set bench to 30–45 degrees","Focus on upper chest stretch at bottom","Don't let elbows flare too wide","Control the descent — 2 sec down"],yt:"https://www.youtube.com/results?search_query=incline+bench+press+form"},
  {name:"Incline Dumbbell Press",muscle:"Chest",tips:["Squeeze chest at the top","Full range of motion — stretch at bottom","Keep wrists stacked over elbows","Neutral or pronated grip both work"],yt:"https://www.youtube.com/results?search_query=incline+dumbbell+press+tutorial"},
  {name:"Dumbbell Fly",muscle:"Chest",tips:["Slight bend in elbows throughout","Think hugging a barrel","Feel the stretch at the bottom","Don't go too heavy — feel the muscle"],yt:"https://www.youtube.com/results?search_query=dumbbell+fly+form"},
  {name:"Cable Fly",muscle:"Chest",tips:["Keep slight elbow bend","Cross hands at top for full squeeze","Control the return","Lean slightly forward from hips"],yt:"https://www.youtube.com/results?search_query=cable+fly+chest+tutorial"},
  {name:"Push Up",muscle:"Chest",tips:["Body in a straight line","Hands slightly wider than shoulders","Lower chest to 1 inch from floor","Full lockout at top"],yt:"https://www.youtube.com/results?search_query=perfect+push+up+form"},
  {name:"Dips",muscle:"Chest",tips:["Lean forward to hit chest more","Upper arm parallel to floor at bottom","Full lockout at top","Control the descent"],yt:"https://www.youtube.com/results?search_query=chest+dips+form+tutorial"},
  {name:"Barbell Row",muscle:"Back",tips:["Hinge at hips, back nearly parallel","Pull bar to lower chest/belly button","Keep elbows close to body","Squeeze shoulder blades at top"],yt:"https://www.youtube.com/results?search_query=barbell+row+form+tutorial"},
  {name:"Seated Cable Row",muscle:"Back",tips:["Sit tall, don't rock back","Pull handle to lower chest","Full stretch at start","Squeeze hard at end of each rep"],yt:"https://www.youtube.com/results?search_query=seated+cable+row+form"},
  {name:"Lat Pulldown",muscle:"Back",tips:["Slight lean back, chest up","Pull bar to upper chest","Think elbows to hips","Control the weight back up"],yt:"https://www.youtube.com/results?search_query=lat+pulldown+form+tutorial"},
  {name:"Pull Up",muscle:"Back",tips:["Start from dead hang","Pull until chin clears bar","Initiate with shoulder blades","Control the descent fully"],yt:"https://www.youtube.com/results?search_query=pull+up+form+tutorial"},
  {name:"Chin Up",muscle:"Back",tips:["Supinated grip (palms facing you)","Elbows close to body","Full dead hang at bottom","Squeeze biceps and lats at top"],yt:"https://www.youtube.com/results?search_query=chin+up+form+tutorial"},

// ── TIMER ─────────────────────────────────────────────────────────────────────
let timerInterval=null,timerTotal=0,timerLeft=0,timerEndTime=null;

function startTimer(seconds){
  clearInterval(timerInterval);
  timerTotal=seconds; timerLeft=seconds;
  timerEndTime=Date.now()+(seconds*1000);
  document.getElementById("timer-bar").classList.remove("hidden");
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timerLeft=Math.max(0,Math.round((timerEndTime-Date.now())/1000));
    updateTimerDisplay();
    if(timerLeft<=0){
      clearInterval(timerInterval);
      document.getElementById("timer-count").textContent="GO!";
      document.getElementById("timer-progress").style.width="0%";
      playTimerDone();
      const scr=document.getElementById("screen-log");
      if(scr)scr.classList.add("timer-done");
      setTimeout(()=>{
        if(scr)scr.classList.remove("timer-done");
        document.getElementById("timer-bar").classList.add("hidden");
      },2000);
    }
  },250);
}

function updateTimerDisplay(){
  const m=Math.floor(timerLeft/60),s=timerLeft%60;
  document.getElementById("timer-count").textContent=m+":"+(s<10?"0"+s:s);
  document.getElementById("timer-progress").style.width=((timerLeft/timerTotal)*100)+"%";
}

function adjustTimer(delta){
  if(!timerEndTime) return;
  timerEndTime+=delta*1000;
  timerTotal=Math.max(5,timerTotal+delta);
  timerLeft=Math.max(0,Math.round((timerEndTime-Date.now())/1000));
  updateTimerDisplay();
}

function skipTimer(){
  clearInterval(timerInterval);
  timerInterval=null; timerEndTime=null;
  document.getElementById("timer-bar").classList.add("hidden");
}

function fmtDate(iso){return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}
function totalVol(w){return w.exercises.reduce((s,ex)=>s+ex.sets.reduce((s2,set)=>s2+(parseFloat(set.reps)||0)*(parseFloat(set.weight)||0),0),0);}
function dbLookup(name){return DB.find(e=>e.name===name)||null;}
function getLastSession(exName){for(let w of workouts){const ex=w.exercises.find(e=>e.name===exName);if(ex)return{date:w.date,sets:ex.sets};}return null;}
function getExerciseHistory(exName){const h=[];for(let w of workouts){const ex=w.exercises.find(e=>e.name===exName);if(ex)h.push({date:w.date,sets:ex.sets});}return h;}
function getBestSet(exName){let best={weight:0,reps:0};for(let w of workouts){const ex=w.exercises.find(e=>e.name===exName);if(ex)for(let s of ex.sets){if((parseFloat(s.weight)||0)>best.weight)best={weight:parseFloat(s.weight)||0,reps:parseFloat(s.reps)||0};}}return best.weight>0?best:null;}
function getAllLoggedExercises(){const n=new Set();for(let w of workouts)for(let ex of w.exercises)n.add(ex.name);return Array.from(n).sort();}

// Check if two exercises are in a superset pair together (adjacent superset:true)
function getSupersetGroupId(exercises, idx){
  if(!exercises[idx].superset) return null;
  // walk back to start of superset block
  let start=idx;
  while(start>0&&exercises[start-1].superset) start--;
  return start;
}

function allSupersetPartnersLogged(exercises, setIdx, exIdx){
  // Find the superset group this exercise belongs to
  const groupStart=getSupersetGroupId(exercises,exIdx);
  if(groupStart===null) return true;
  // Find all exercises in this group
  let i=groupStart;
  while(i<exercises.length&&exercises[i].superset){
    const ex=exercises[i];
    if(setIdx<ex.sets.length&&!ex.sets[setIdx].logged) return false;
    i++;
  }
  return true;
}

      </div>${exHTML}<div style="height:20px"></div>`;
  } else {
    const exHTML=day.exercises.map((ex,idx)=>`
      <div class="prog-edit-card" style="border-left:3px solid ${day.color}">
        <div style="flex:1">
          <div style="font-size:15px;font-weight:800;margin-bottom:6px;">${ex.name}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <input class="prog-sets-input" type="number" value="${ex.sets}" min="1" max="10" oninput="updateProgEx(${idx},'sets',this.value)"/>
            <span style="color:#888;font-size:13px;">sets ×</span>
            <input class="prog-reps-input" type="text" value="${ex.reps}" oninput="updateProgEx(${idx},'reps',this.value)"/>
            <span style="color:#888;font-size:13px;">reps</span>
          </div>
        </div>
        <button class="prog-remove-btn" onclick="removeProgEx(${idx})">✕</button>
      </div>`).join("");
    s.innerHTML=`
      <div class="log-header">
        <button class="back-btn" onclick="toggleProgramEdit()">Cancel</button>
        <div class="log-title" style="color:#FF6B2C">Edit ${day.name}</div>
        <button class="done-btn" onclick="saveProgramDay()">Save</button>
      </div>
      <div style="font-size:13px;color:#888;margin-bottom:16px;">Tap ✕ to remove · Edit sets & reps inline</div>
      ${exHTML}
      <button class="add-ex-btn" onclick="showExPicker('program')">+ Add Exercise</button>
      <button class="reset-btn" onclick="resetProgramDay()">↩ Reset to default</button>
      <div style="height:20px"></div>`;
  }
}

function toggleProgramEdit(){programEditMode=!programEditMode;renderProgramDay();}
function updateProgEx(idx,field,val){const day=PROGRAM[selectedDayIdx];if(field==="sets")day.exercises[idx].sets=parseInt(val)||1;else day.exercises[idx].reps=val;}
function removeProgEx(idx){PROGRAM[selectedDayIdx].exercises.splice(idx,1);saveProgram();renderProgramDay();}
function saveProgramDay(){saveProgram();programEditMode=false;renderProgramDay();}
function resetProgramDay(){if(!confirm("Reset to original?"))return;PROGRAM[selectedDayIdx].exercises=JSON.parse(JSON.stringify(DEFAULT_PROGRAM[selectedDayIdx].exercises));saveProgram();renderProgramDay();}

// ── LOG ───────────────────────────────────────────────────────────────────────
function startWorkout(prefill){
  clearDraft();
  const exercises=prefill
    ?prefill.map(ex=>({name:ex.name,sets:Array.from({length:ex.sets},()=>({reps:"",weight:"",logged:false})),note:ex.note||"",superset:!!ex.superset,targetSets:ex.sets,targetReps:ex.reps}))
    :[];
  activeWorkout={id:Date.now(),date:new Date().toISOString(),exercises};
  saveDraft();
  renderLog();goTo("log");
}

function renderLog(){
  const s=document.getElementById("screen-log");
  const exHTML=activeWorkout.exercises.map((ex,ei)=>{
    const last=getLastSession(ex.name);
    const hist=getExerciseHistory(ex.name).slice(0,4);

    // Last session reference
    const lastHTML=last?`<div class="last-ref">
      <div class="last-ref-title">LAST SESSION — ${fmtDate(last.date)}</div>
      <div class="last-ref-row">${last.sets.map((s,i)=>`<span class="last-ref-set">S${i+1}: ${s.weight||"—"}lbs×${s.reps||"—"}</span>`).join("")}</div>
    </div>`:"";

    // In-workout history (last 4 sessions)
    const histHTML=hist.length>0?`<div class="inwork-hist">
      <div class="inwork-hist-title">WEIGHT HISTORY</div>
      ${hist.map(h=>{
        const best=h.sets.reduce((b,set)=>(parseFloat(set.weight)||0)>(b.w||0)?{w:parseFloat(set.weight)||0,r:parseFloat(set.reps)||0}:b,{w:0,r:0});
        return `<div class="inwork-hist-row"><span class="inwork-hist-date">${fmtDate(h.date)}</span><span class="inwork-hist-val">${h.sets.map((s,i)=>`${s.weight||"—"}×${s.reps||"—"}`).join("  ")}</span></div>`;
      }).join("")}
    </div>`:"";

    const allLogged=ex.sets.every(s=>s.logged);
    return `
    <div class="ex-card${ex.superset?" superset":""}">
      ${ex.superset?'<div class="superset-tag">⚡ SUPERSET</div>':""}
      <div class="ex-card-header">
        <div class="ex-name">${ex.name}</div>
        <div style="display:flex;gap:2px;">
          <button class="ex-info-btn" onclick="showInfo('${ex.name.replace(/'/g,"\\'")}',false)">ℹ️</button>
          <button class="remove-ex-btn" onclick="removeExFromLog(${ei})">✕</button>
        </div>
      </div>
      ${ex.note?`<div class="ex-note-small">${ex.note}</div>`:""}
      ${ex.targetSets&&ex.targetReps?`<div style="display:inline-flex;align-items:center;gap:6px;background:#FF6B2C18;border:1px solid #FF6B2C33;border-radius:8px;padding:4px 10px;margin-bottom:8px;"><span style="font-size:13px;font-weight:900;color:#FF6B2C;letter-spacing:1px;">TARGET</span><span style="font-size:13px;font-weight:700;color:#F0F0F0;">${ex.targetSets} sets × ${ex.targetReps} reps</span></div>`:""}
      ${lastHTML}${histHTML}
      <div class="set-grid">
        <div class="set-col-label">#</div>
        <div class="set-col-label">lbs</div>
        <div class="set-col-label">Reps</div>
        <div class="set-col-label" style="font-size:9px;text-align:center;">✓</div>
      </div>
      ${ex.sets.map((set,si)=>`
        <div class="set-grid">
          <div class="set-num">${si+1}</div>
          <input class="set-input${set.logged?" logged":""}" type="number" inputmode="decimal" placeholder="0" value="${set.weight}" oninput="updateLogSet(${ei},${si},'weight',this.value)"/>
          <input class="set-input${set.logged?" logged":""}" type="number" inputmode="numeric" placeholder="0" value="${set.reps}" oninput="updateLogSet(${ei},${si},'reps',this.value)"/>
          <button class="done-set-btn${set.logged?" logged":""}" onclick="logSet(${ei},${si})">${set.logged?"✓":"○"}</button>
        </div>`).join("")}
      <button class="add-set-btn" onclick="addLogSet(${ei})">+ Add Set</button>
    </div>`;
  }).join("");

  s.innerHTML=`
    <div class="log-header">
      <button class="back-btn" onclick="leaveWorkout()">✕</button>
      <div class="log-title">Today's Workout</div>
      <button class="done-btn" onclick="finishWorkout()">Finish</button>
    </div>
    <div class="log-date">${fmtDate(activeWorkout.date)}</div>
    ${exHTML}
    <button class="add-ex-btn" onclick="showExPicker('log')">+ Add Exercise</button>`;
}

function logSet(ei,si){
  const set=activeWorkout.exercises[ei].sets[si];
  set.logged=!set.logged;
  saveDraft();
  renderLog();
  if(set.logged){
    showBible();
    // Only start timer for non-superset, or if ALL partners in the superset pair are done
    const ex=activeWorkout.exercises[ei];
    if(!ex.superset){
      startTimer(defaultTimerSecs);
    } else {
      if(allSupersetPartnersLogged(activeWorkout.exercises,si,ei)){
        startTimer(defaultTimerSecs);
      }
    }
  }
}

function addLogSet(ei){activeWorkout.exercises[ei].sets.push({reps:"",weight:"",logged:false});saveDraft();renderLog();}
function removeLogSet(ei,si){if(activeWorkout.exercises[ei].sets.length>1){activeWorkout.exercises[ei].sets.splice(si,1);saveDraft();renderLog();}}
function updateLogSet(ei,si,field,val){activeWorkout.exercises[ei].sets[si][field]=val;saveDraft();}
function removeExFromLog(ei){activeWorkout.exercises.splice(ei,1);saveDraft();renderLog();}

function leaveWorkout(){
  // Save draft and go home — don't discard
  saveDraft();
  skipTimer();
  goTo("home");
}

function finishWorkout(){
  if(!activeWorkout.exercises.length){clearDraft();skipTimer();goTo("home");return;}
  skipTimer();workouts.unshift(activeWorkout);save();clearDraft();activeWorkout=null;goTo("home");
}

// ── PROGRESS ─────────────────────────────────────────────────────────────────
function renderProgress(){
  const s=document.getElementById("screen-progress");
  const logged=getAllLoggedExercises();
  if(logged.length===0){
    s.innerHTML=`<div class="log-header"><div style="width:40px"></div><div class="log-title">Progress</div><div style="width:40px"></div></div><div class="empty-msg">Log some workouts first<br>to see your progress.</div>`;
    return;
  }
  const cards=logged.map(name=>{
    const best=getBestSet(name);
    const hist=getExerciseHistory(name);
    return `<div class="progress-ex-card" onclick="openProgressEx('${name.replace(/'/g,"\\'")}')">
      <div class="progress-ex-name">${name}</div>
      <div class="progress-ex-best">${best?`Best: <span>${best.weight} lbs × ${best.reps} reps</span> · `:""}
      <span>${hist.length}</span> session${hist.length!==1?"s":""}</div>
    </div>`;
  }).join("");
  s.innerHTML=`<div class="log-header"><div style="width:40px"></div><div class="log-title">Progress</div><div style="width:40px"></div></div>${cards}`;
}

function openProgressEx(name){selectedProgressEx=name;renderProgressEx();goTo("progress-ex");}

function renderProgressEx(){
  const s=document.getElementById("screen-progress-ex");
  const name=selectedProgressEx;
  const history=getExerciseHistory(name);
  const best=getBestSet(name);
  const recent=history.slice(0,8).reverse();
  const maxVol=Math.max(...recent.map(h=>h.sets.reduce((s,set)=>(parseFloat(set.weight)||0)*(parseFloat(set.reps)||0)+s,0)),1);
  const chartBars=recent.map(h=>{
    const vol=h.sets.reduce((s,set)=>(parseFloat(set.weight)||0)*(parseFloat(set.reps)||0)+s,0);
    const pct=Math.round((vol/maxVol)*100);
    const d=new Date(h.date);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;">
      <div style="font-size:9px;color:#888;">${vol>0?vol.toLocaleString():""}</div>
      <div style="width:100%;background:#222228;border-radius:4px;height:80px;display:flex;align-items:flex-end;overflow:hidden;">
        <div style="width:100%;background:#FF6B2C;border-radius:4px 4px 0 0;height:${pct}%;"></div>
      </div>
      <div style="font-size:9px;color:#888;">${(d.getMonth()+1)+"/"+(d.getDate())}</div>
    </div>`;
  }).join("");
  const histRows=history.map(h=>{
    const setStr=h.sets.map((set,i)=>`S${i+1}: ${set.weight||"—"}×${set.reps||"—"}`).join("  ");
    const bst=h.sets.reduce((b,set)=>(parseFloat(set.weight)||0)>(b.w||0)?{w:parseFloat(set.weight)||0,r:parseFloat(set.reps)||0}:b,{w:0,r:0});
    return `<div class="progress-history-row">
      <div><div class="progress-history-date">${fmtDate(h.date)}</div><div style="font-size:11px;color:#666;margin-top:2px;">${setStr}</div></div>
      <div class="progress-history-sets">${bst.w?bst.w+" lbs":""}</div>
    </div>`;
  }).join("");
  s.innerHTML=`
    <div class="log-header">
      <button class="back-btn" onclick="goTo('progress')">←</button>
      <div class="log-title">${name}</div><div style="width:40px"></div>
    </div>
    ${best?`<div class="vol-big">${best.weight}<span class="vol-unit"> lbs</span></div><div class="vol-label">Personal Best × ${best.reps} reps</div>`:""}
    <div style="font-size:12px;font-weight:700;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;">Volume Per Session</div>
    <div style="display:flex;gap:4px;align-items:flex-end;margin-bottom:24px;padding:0 4px;">${chartBars}</div>
    <div class="section-label">All Sessions</div>${histRows}`;
}

// ── HISTORY ───────────────────────────────────────────────────────────────────
function renderHistory(){
  const s=document.getElementById("screen-history");
  const list=workouts.length===0
    ?`<div class="empty-msg">No workouts logged yet.</div>`
    :workouts.map((w,i)=>`
      <div class="summary-card" onclick="openDetail(${i})">
        <div class="summary-date">${fmtDate(w.date)}</div>
        <div class="summary-exlist">${w.exercises.map(e=>e.name).join(" · ")}</div>
        <div class="summary-vol">${totalVol(w).toLocaleString()} lbs total volume</div>
      </div>`).join("");
  s.innerHTML=`<div class="log-header"><button class="back-btn" onclick="goTo('home')">←</button><div class="log-title">History</div><div style="width:48px"></div></div>${list}`;
}

// ── DETAIL / EDIT ─────────────────────────────────────────────────────────────
function openDetail(i){selectedWorkoutIdx=i;selectedWorkout=workouts[i];editMode=false;renderDetail();goTo("detail");}

function renderDetail(){
  const s=document.getElementById("screen-detail");
  const w=selectedWorkout;
  if(!editMode){
    const exHTML=w.exercises.map(ex=>`
      <div class="ex-card">
        <div class="ex-card-header">
          <div class="ex-name">${ex.name}</div>
          <button class="ex-info-btn" onclick="showInfo('${ex.name.replace(/'/g,"\\'")}',false)">ℹ️</button>
        </div>
        ${ex.sets.map((set,si)=>`
          <div class="detail-set-row">
            <span class="detail-set-num">Set ${si+1}</span>
            <span class="detail-set-val">${set.weight||"—"} lbs × ${set.reps||"—"} reps</span>
          </div>`).join("")}
      </div>`).join("");
    s.innerHTML=`
      <div class="log-header">
        <button class="back-btn" onclick="goTo('history')">←</button>
        <div class="log-title">${fmtDate(w.date)}</div>
        <div style="display:flex;gap:6px;">
          <button class="edit-btn" onclick="toggleEdit()">Edit</button>
          <button class="delete-btn" onclick="deleteWorkout(${selectedWorkoutIdx})">🗑</button>
        </div>
      </div>
      <div class="vol-big">${totalVol(w).toLocaleString()}<span class="vol-unit"> lbs</span></div>
      <div class="vol-label">Total Volume</div>${exHTML}`;
  } else {
    const exHTML=w.exercises.map((ex,ei)=>`
      <div class="ex-card">
        <div class="ex-card-header">
          <div class="ex-name" style="font-size:14px">${ex.name}</div>
          <button class="remove-ex-btn" onclick="removeExFromSaved(${ei})" style="color:#ff4444;font-size:12px;font-weight:700;">✕ Remove</button>
        </div>
        <div class="set-grid"><div class="set-col-label">#</div><div class="set-col-label">lbs</div><div class="set-col-label">Reps</div><div></div></div>
        ${ex.sets.map((set,si)=>`
          <div class="set-grid">
            <div class="set-num">${si+1}</div>
            <input class="edit-set-input" type="number" inputmode="decimal" placeholder="0" value="${set.weight}" oninput="updateSavedSet(${ei},${si},'weight',this.value)"/>
            <input class="edit-set-input" type="number" inputmode="numeric" placeholder="0" value="${set.reps}" oninput="updateSavedSet(${ei},${si},'reps',this.value)"/>
            <button class="remove-set-btn" onclick="removeSavedSet(${ei},${si})" style="background:transparent;border:none;color:#888;font-size:18px;cursor:pointer;">−</button>
          </div>`).join("")}
        <button class="add-set-btn" onclick="addSavedSet(${ei})">+ Add Set</button>
      </div>`).join("");
    s.innerHTML=`
      <div class="log-header">
        <button class="back-btn" onclick="toggleEdit()">Cancel</button>
        <div class="log-title" style="color:#FF6B2C">Edit Workout</div>
        <button class="done-btn" onclick="saveEdits()">Save</button>
      </div>
      <div class="log-date">${fmtDate(w.date)}</div>
      ${exHTML}
      <button class="add-ex-btn" onclick="showExPicker('edit')">+ Add Exercise</button>`;
  }
}

function toggleEdit(){editMode=!editMode;renderDetail();}
function updateSavedSet(ei,si,field,val){selectedWorkout.exercises[ei].sets[si][field]=val;}
function addSavedSet(ei){selectedWorkout.exercises[ei].sets.push({reps:"",weight:""});renderDetail();}
function removeSavedSet(ei,si){if(selectedWorkout.exercises[ei].sets.length>1){selectedWorkout.exercises[ei].sets.splice(si,1);renderDetail();}}
function removeExFromSaved(ei){selectedWorkout.exercises.splice(ei,1);renderDetail();}
function saveEdits(){workouts[selectedWorkoutIdx]=selectedWorkout;save();editMode=false;renderDetail();}
function deleteWorkout(i){if(!confirm("Delete this workout?"))return;workouts.splice(i,1);save();goTo("history");}

// ── EXERCISE PICKER ───────────────────────────────────────────────────────────
function showExPicker(context){
  pickerContext=context;activeMuscle="All";
  document.getElementById("modal-ex").classList.remove("hidden");
  document.getElementById("muscle-tabs").innerHTML=MUSCLES.map(m=>`<button class="muscle-tab${m==="All"?" active":""}" onclick="filterMuscle('${m}')">${m}</button>`).join("");
  const search=document.getElementById("ex-search");
  search.value="";
  search.oninput=e=>renderExList(e.target.value,activeMuscle);
  document.getElementById("modal-ex").onclick=e=>{if(e.target===document.getElementById("modal-ex"))hideExPicker();};
  renderExList("","All");search.focus();
}
function filterMuscle(m){
  activeMuscle=m;
  document.querySelectorAll(".muscle-tab").forEach(t=>t.classList.toggle("active",t.textContent===m));
  renderExList(document.getElementById("ex-search").value,m);
}
function renderExList(q,muscle){
  const filtered=DB.filter(e=>e.name.toLowerCase().includes(q.toLowerCase())&&(muscle==="All"||e.muscle===muscle));
  document.getElementById("ex-list").innerHTML=filtered.length
    ?filtered.map(e=>`<div class="ex-item" onclick="addExerciseFromPicker('${e.name.replace(/'/g,"\\'")}')">
        <span style="flex:1">${e.name}</span>
        <span class="ex-muscle-tag">${e.muscle}</span>
        <button class="ex-info-btn" style="margin-left:4px" onclick="event.stopPropagation();showInfo('${e.name.replace(/'/g,"\\'")}',true)">ℹ️</button>
      </div>`).join("")
    :`<div class="empty-msg">No exercises found</div>`;
}
function hideExPicker(){document.getElementById("modal-ex").classList.add("hidden");}
function addExerciseFromPicker(name){
  if(pickerContext==="log"){activeWorkout.exercises.push({name,sets:[{reps:"",weight:"",logged:false}],note:"",superset:false});saveDraft();hideExPicker();renderLog();}
  else if(pickerContext==="edit"){selectedWorkout.exercises.push({name,sets:[{reps:"",weight:""}],note:"",superset:false});hideExPicker();renderDetail();}
  else if(pickerContext==="program"){PROGRAM[selectedDayIdx].exercises.push({name,sets:3,reps:"10",note:"",superset:false});saveProgram();hideExPicker();renderProgramDay();}
}

  const addBtn=fromPicker?`<button class="add-from-info-btn" onclick="addExerciseFromPicker('${ex.name.replace(/'/g,"\\'")}');hideInfo();">+ Add to Workout</button>`:"";

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let _audioCtx=null;
function getAudioCtx(){
  if(!_audioCtx||_audioCtx.state==='closed'){
    try{_audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch{return null;}
  }
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
// Prime audio context on first user tap so it's ready when timer finishes
document.addEventListener('touchstart',()=>{getAudioCtx();},{once:true,passive:true});
document.addEventListener('click',()=>{getAudioCtx();},{once:true});

function playTimerDone(){
  const a=getAudioCtx();
  if(!a) return;
  // Three ascending beeps — loud and clear
  const beeps=[
    {freq:660,t:0,dur:0.18},
    {freq:770,t:0.22,dur:0.18},
    {freq:880,t:0.44,dur:0.35},
  ];
  beeps.forEach(b=>{
    const o=a.createOscillator();
    const g=a.createGain();
    const now=a.currentTime;
    o.connect(g);g.connect(a.destination);
    o.type='sine';
    o.frequency.value=b.freq;
    g.gain.setValueAtTime(0,now+b.t);
    g.gain.linearRampToValueAtTime(0.6,now+b.t+0.02);
    g.gain.setValueAtTime(0.6,now+b.t+b.dur-0.04);
    g.gain.linearRampToValueAtTime(0,now+b.t+b.dur);
    o.start(now+b.t);
    o.stop(now+b.t+b.dur+0.05);
  });
}

goTo("home");
